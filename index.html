<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Legislative Analyzer</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: #f4f6f9;
    color: #1f2937;
}

/* HEADER */
.header {
    background: #111827;
    color: white;
    padding: 18px 40px;
    font-size: 20px;
    font-weight: 600;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 50px;
    background: white;
}

.hero-text {
    max-width: 500px;
}

.hero h1 {
    font-size: 32px;
    margin-bottom: 10px;
}

.hero p {
    color: #6b7280;
    line-height: 1.6;
}

.hero img {
    width: 350px;
    border-radius: 10px;
}

/* MAIN */
.container {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

label {
    font-weight: 600;
    margin-bottom: 10px;
    display: block;
}

textarea {
    width: 100%;
    height: 160px;
    padding: 14px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 15px;
    outline: none;
}

textarea:focus {
    border-color: #2563eb;
}

button {
    margin-top: 15px;
    padding: 12px 20px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

/* OUTPUT */
.output {
    margin-top: 25px;
    padding: 20px;
    background: #f9fafb;
    border-radius: 8px;
    border: 1px solid #e5e7eb;
}

ul {
    padding-left: 20px;
}

li {
    margin-bottom: 8px;
}

/* FOOTER */
.footer {
    text-align: center;
    margin: 40px;
    color: #6b7280;
}
</style>
</head>

<body>

<div class="header">
    AI Legislative Analyzer
</div>

<!-- HERO SECTION -->
<div class="hero">
    <div class="hero-text">
        <h1>Analyze Legal Documents Efficiently</h1>
        <p>
            Extract key insights, summarize legal content, and understand complex policies using AI-powered analysis.
        </p>
    </div>

    <img src="https://images.unsplash.com/photo-1589829545856-d10d557cf95f" alt="Legal analysis">
</div>

<!-- MAIN -->
<div class="container">

<div class="card">

<label>Enter Legal or Policy Text</label>

<textarea id="text" placeholder="Paste legal document or policy text here..."></textarea>

<button onclick="send()">Analyze</button>

<div class="output" id="output">
    Results will appear here.
</div>

</div>

</div>

<div class="footer">
    Intelligent document analysis system
</div>

<script>
async function send() {
    const text = document.getElementById("text").value;
    const output = document.getElementById("output");

    if (!text.trim()) {
        output.innerHTML = "Please enter text.";
        return;
    }

    output.innerHTML = "Processing...";

    try {
        const response = await fetch("https://ai-legislative-analyzer-7.onrender.com/api/search", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ query: text })
        });

        const data = await response.json();

        if (data.results) {
            output.innerHTML = "<ul>" +
                data.results.map(r => `<li>${r}</li>`).join("") +
                "</ul>";
        } else {
            output.innerHTML = "No results found.";
        }

    } catch (error) {
        output.innerHTML = "Error connecting to server.";
    }
}
</script>

</body>
</html>
